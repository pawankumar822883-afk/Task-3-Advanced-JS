<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Styling & JS Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ApexPlanet Dev Portal</h1>
        <p>Responsive Design & JavaScript Integration</p>
    </header>

    <main class="container">
        <section class="card" id="quiz-section">
            <h2>🧠 Interactive Quiz</h2>
            <div id="quiz-container">
                <div id="question-text">Loading question...</div>
                <div id="answer-buttons" class="btn-grid"></div>
            </div>
            <div id="controls">
                <button id="next-btn" class="hidden">Next Question</button>
            </div>
        </section>

        <section class="card" id="api-section">
            <h2>☁️ Real-time Weather API</h2>
            <div class="api-content">
                <input type="text" id="city-input" placeholder="Enter city (e.g., London)">
                <button id="fetch-btn">Get Weather</button>
                <div id="weather-display">
                    <p>Search for a city to see dynamic data.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
